# SPDX-License-Identifier: GPL-3.0-or-later
name: ci

 # The main-branch protection rule requires the checks "lint + test" and
 # "build release binary", but release.yml only runs on push to main
# This workflow reports checks on pull requests
# targeting main so the required checks can actually pass before merging.
 # The build job mirrors release.yml's build without publishing anything.

on:
   pull_request:
     branches: [main]
   workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version-file: .python-version
      - name: Install system test deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libportaudio2
      - name: Install dev extras
        run: |
          python -m venv .venv
          .venv/bin/pip install -e ".[dev]"
      - name: ruff check
        run: .venv/bin/ruff check .
      - name: ruff format check
        run: .venv/bin/ruff format --check .
      - name: pytest (unit)
        run: .venv/bin/pytest -m "not integration"

  build-release:
    name: build release binary
    runs-on: ubuntu-latest
    needs: [lint-test]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version-file: .python-version
      - name: Install system build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y wtype wl-clipboard pipewire-audio libevdev-dev libportaudio2
      - name: Install build extras
        run: |
          python -m venv .venv
          .venv/bin/pip install -e ".[dev,build]"
      - name: Build with PyInstaller
        run: scripts/build.sh
