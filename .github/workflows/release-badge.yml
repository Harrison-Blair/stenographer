name: release-badge

# Runs after the release workflow finishes so the just-published release is
# visible to `gh release view`. A `release: published` trigger would not fire
# here (events raised by the default GITHUB_TOKEN don't start new workflow runs),
# and a `push: main` trigger would race ahead of the release being published.
on:
  workflow_run:
    workflows: [release]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-badge
  cancel-in-progress: false

jobs:
  update-badge:
    runs-on: ubuntu-latest
    # On workflow_run, only proceed if the release actually succeeded.
    # workflow_dispatch has no workflow_run context, so allow it through.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - name: Compute badge state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag=$(gh release view --json tagName -q .tagName 2>/dev/null || true)
          if [ -n "$tag" ]; then
            message="$tag"; color="brightgreen"
          else
            message="unreleased"; color="orange"
          fi
          printf '{"schemaVersion":1,"label":"release","message":"%s","color":"%s"}\n' \
            "$message" "$color" > /tmp/release.json
          echo "Badge: $message ($color)"

      - name: Publish to badges branch
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin badges || true
          if git show-ref --quiet refs/remotes/origin/badges; then
            git checkout badges
          else
            git checkout --orphan badges
            git rm -rf . >/dev/null 2>&1 || true
          fi
          cp /tmp/release.json release.json
          git add release.json
          git diff --cached --quiet && { echo "no change"; exit 0; }
          git commit -m "chore: update release badge"
          git push origin badges
