name: release

on:
  push:
    branches: [main]
  workflow_dispatch:   # keep manual re-runs available

jobs:
  lint-test:
    name: lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version-file: .python-version
      - name: Install system test deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libportaudio2
      - name: Install dev extras
        run: |
          python -m venv .venv
          .venv/bin/pip install -e ".[dev]"
      - name: ruff check
        run: .venv/bin/ruff check .
      - name: ruff format check
        run: .venv/bin/ruff format --check .
      - name: pytest (unit)
        run: .venv/bin/pytest -m "not integration"

  build-release:
    name: build release binary
    runs-on: ubuntu-latest
    needs: [lint-test]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version-file: .python-version
      - name: Install system build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y wtype wl-clipboard pipewire-audio libevdev-dev libportaudio2
      - name: Install build extras
        run: |
          python -m venv .venv
          .venv/bin/pip install -e ".[dev,build]"
      - name: Set VERSION from pyproject.toml
        run: |
          version=$(python -c "import tomllib,pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          echo "VERSION=${version}" >> "$GITHUB_ENV"
      - name: Check if release already exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "v${VERSION}" &>/dev/null; then
            echo "::error::Release v${VERSION} already exists. Bump the version in pyproject.toml."
            exit 1
          fi
          echo "Release v${VERSION} does not exist. Proceeding."
      - name: Build with PyInstaller
        run: scripts/build.sh
      - name: Package tarball + sha256
        run: |
          tar -C dist -czf "stenographer-${VERSION}-linux-x86_64.tar.gz" stenographer/
          sha256sum "stenographer-${VERSION}-linux-x86_64.tar.gz" \
            > "stenographer-${VERSION}-linux-x86_64.sha256"
      - name: Build release notes
        run: |
          set -euo pipefail
          {
            echo "## Changes"
            echo
            if prev=$(git describe --tags --abbrev=0 "v${VERSION}^" 2>/dev/null); then
              git log "${prev}..v${VERSION}" --oneline
            elif git describe --tags --abbrev=0 HEAD^ 2>/dev/null > prev_tag; then
              git log "$(cat prev_tag)..HEAD" --oneline
            else
              git log --oneline
            fi
          } > release_notes.md
      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ env.VERSION }}
          body_path: release_notes.md
          draft: false
          files: |
            stenographer-${{ env.VERSION }}-linux-x86_64.tar.gz
            stenographer-${{ env.VERSION }}-linux-x86_64.sha256
          fail_on_unmatched_files: true
